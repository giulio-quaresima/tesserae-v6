name: Deploy to Marvin

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-marvin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: marvin
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MARVIN_HOST }}
          username: ${{ secrets.MARVIN_USER }}
          key: ${{ secrets.MARVIN_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/tesseraev6_flask
            git pull origin main

            if git diff --name-only ORIG_HEAD HEAD | grep -q '^requirements.txt$'; then
              source venv/bin/activate
              pip install -r requirements.txt
              deactivate
            fi

            sudo systemctl restart apache2
