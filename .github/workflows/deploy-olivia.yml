name: Deploy to Olivia

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-olivia
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: olivia
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OLIVIA_HOST }}
          username: ${{ secrets.OLIVIA_USER }}
          key: ${{ secrets.OLIVIA_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/tesseraev6_flask
            git fetch origin
            git checkout "${{ inputs.branch }}"
            git pull origin "${{ inputs.branch }}"

            if git diff --name-only ORIG_HEAD HEAD | grep -q '^requirements.txt$'; then
              source venv/bin/activate
              pip install -r requirements.txt
              deactivate
            fi

            sudo systemctl restart apache2
