name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      server:
        description: "Target server"
        required: true
        type: choice
        options:
          - olivia
          - marvin
      branch:
        description: "Git branch (used for Olivia only)"
        required: true
        default: "main"

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_marvin:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.server == 'marvin')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Marvin via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MARVIN_HOST }}
          username: ${{ secrets.MARVIN_USER }}
          key: ${{ secrets.MARVIN_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/tesseraev6_flask
            git pull origin main

            if git diff --name-only ORIG_HEAD HEAD | grep -q '^requirements.txt$'; then
              source venv/bin/activate
              pip install -r requirements.txt
              deactivate
            fi

            sudo systemctl restart apache2

  deploy_olivia:
    if: github.event_name == 'workflow_dispatch' && inputs.server == 'olivia'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Olivia via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OLIVIA_HOST }}
          username: ${{ secrets.OLIVIA_USER }}
          key: ${{ secrets.OLIVIA_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/tesseraev6_flask
            git fetch origin
            git checkout "${{ inputs.branch }}"
            git pull origin "${{ inputs.branch }}"

            if git diff --name-only ORIG_HEAD HEAD | grep -q '^requirements.txt$'; then
              source venv/bin/activate
              pip install -r requirements.txt
              deactivate
            fi

            sudo systemctl restart apache2
